<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="calbody">
<div class="center">

  <input id="display" readonly>
  <div class="numbers" id="numbers">

    <button onclick="sqrt()">&radic;</button>
    <button onclick="squared ()">x²</button>
    <button onclick="clearDisplay()" style="color: red;">AC</button>
    <button onclick="removeNum()"  style="color: red;">Del</button><br>
    <button onclick="appendToDisplay ('7')" >7</button>
    <button onclick="appendToDisplay ('8')" >8</button>
    <button onclick="appendToDisplay ('9')" >9</button>
    <button onclick="appendToDisplay ('/')"  style="background-color: rgb(245, 245, 14);">÷</button><br>
    <button onclick="appendToDisplay ('4')" >4</button>
    <button onclick="appendToDisplay ('5')" >5</button>
    <button onclick="appendToDisplay ('6')" >6</button>
    <button  onclick="appendToDisplay ('*')"  style="background-color: rgb(245, 245, 14);">×</button><br>
    <button onclick="appendToDisplay ('1')" >1</button>
    <button onclick="appendToDisplay ('2')" >2</button>
    <button onclick="appendToDisplay ('3')" >3</button>
    <button onclick="appendToDisplay ('+')"  style="background-color: rgb(245, 245, 14);">+</button><br>
    <button onclick="appendToDisplay ('0')" >0</button>
    <button onclick="appendToDisplay ('.')" >.</button>
    <button onclick="calculate()"  style="color: red;" ><h1>=</h1></button>
    <button onclick="appendToDisplay ('-')"  style="background-color: rgb(245, 245, 14);">-</button>

  </div>

</div>
</div>
<script src="node.js"></script>

</body>
</html>
